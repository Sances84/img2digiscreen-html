<!-- HTML port of TheEt1234/img2digiscreen (img2digiscreen). Credits to the original project/author. -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>img2digiscreen-html</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 16px auto; }
    textarea { width: 100%; height: 320px; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    button { padding: 8px 12px; }
  </style>
</head>
<body>
  <h1>img2digiscreen-html - img2digiscreen web port</h1>

  <div class="row">
    <input id="file" type="file" accept="image/*" />
    <label>
      Screen size:
      <select id="size">
        <option value="16" selected>16×16</option>
        <option value="32">32×32</option>
      </select>
    </label>
    <button id="go">Convert</button>
  </div>

  <p>Output: Lua code to paste into your luacontroller with digiscreen.</p>
  <textarea id="out" spellcheck="false"></textarea>

  <canvas id="c" width="16" height="16" style="display:none"></canvas>

  <script>
    const fileEl = document.getElementById('file');
    const sizeEl = document.getElementById('size');
    const outEl = document.getElementById('out');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    document.getElementById('go').onclick = async () => {
      const file = fileEl.files?.[0];
      if (!file) return;

      const screen = "screen0";
      const target = Number(sizeEl.value);

      const img = await loadImageFromFile(file);
      const bmpW = target, bmpH = target;

      canvas.width = bmpW;
      canvas.height = bmpH;

      // Draw resized image
      ctx.clearRect(0, 0, bmpW, bmpH);
      ctx.drawImage(img, 0, 0, bmpW, bmpH);

      // Read pixels (RGBA)
      const imageData = ctx.getImageData(0, 0, bmpW, bmpH);
      const data = imageData.data;

      // Build mem.${screen}={{ {row0},{row1},... }}
      let code = `--Generated with frog's img2digiscreen\nif event.type=='program' then mem.${screen}={{ `;

      for (let y = 0; y < bmpH; y++) {
        if (y !== 0) code += `},\n{ `;
        for (let x = 0; x < bmpW; x++) {
          const idx = (y * bmpW + x) * 4;
          const r = data[idx + 0];
          const g = data[idx + 1];
          const b = data[idx + 2];
          code += `"${rgbToHex(r,g,b)}",`;
        }
      }

      code += `}} end\n`;
      code += `if event.type=='program' then digiline_send("${screen}",mem.${screen}) end\n`;

      outEl.value = code;
    };

    function rgbToHex(r, g, b) {
      const red = r.toString(16).padStart(2, '0');
      const green = g.toString(16).padStart(2, '0');
      const blue = b.toString(16).padStart(2, '0');
      return `${red}${green}${blue}`;
    }

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }
  </script>
</body>
</html>
